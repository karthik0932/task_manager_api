name: Django CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Lint Check
      run: |
        flake8 .
    
    - name: Run migrations
      run: python manage.py migrate
    
    - name: Run tests
      run: python manage.py test

    - name: Create Build Package
      run: |
        zip -r app.zip . -x "venv/*" "__pycache__/*" ".git/*"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: django-build
        path: app.zip

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: dev

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: django-build
      
      - name: Print Environment Variable
        run: |
          echo "Application Environment: ${{ vars.APP_ENV }}"

      - name: Verify Secret Access
        run: |
          echo "Checking secret availability..."
          echo "${{ secrets.DJANGO_SECRET_KEY }}" | wc -c
          
      - name: Simulate Deployment
        run: |
          echo "Deploying application in ${{ vars.APP_ENV }} mode..."
          ls -l
  
  deploy-prod:
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment:
      name: prod

    steps:
      - name: Simulate Production Deployment
        run: |
          echo "Deploying to PRODUCTION..."
